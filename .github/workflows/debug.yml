name: Build and deploy Sphinx docs (diagnostics)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx_rtd_theme myst-parser

      - name: Build Sphinx HTML
        run: |
          sphinx-build -b html source build/html

      - name: Diagnostics - list files and sizes
        run: |
          echo "=== build/html top-level ==="
          ls -la build || true
          ls -la build/html || true
          echo "=== recursive listing (first 500 lines) ==="
          find build/html -type f | sed -n '1,500p'
          echo "=== size summary ==="
          du -sh build/html || true
          echo "=== index.html head (if exists) ==="
          if [ -f build/html/index.html ]; then head -n 60 build/html/index.html; else echo 'index.html not found'; fi

      - name: Upload workflow artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-build-html
          path: build/html

      - name: Upload Pages artifact (for deploy)
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
